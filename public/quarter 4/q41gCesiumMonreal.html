<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Form</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #eaeaea; 
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .container {
    background: #111; 
    padding: 30px;
    border-radius: 12px;
    width: 600px;
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
  }

  h2, h3 {
    text-align: center;
  }

  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #333;
    background-color: #000;
    color: #fff;
    transition: all 0.25s ease;
  }

  input:hover, select:hover {
    border-color: #aaa;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
  }

  input:focus, select:focus {
    outline: none;
    background-color: #fff;  
    color: #000;          
    border-color: #fff;

    box-shadow:
      0 0 5px #fff,
      0 0 10px #fff,
      0 0 20px #fff,
      0 0 40px rgba(255,255,255,0.9);
  }

  .star {
    font-size: 24px;
    cursor: pointer;
    color: #555;
    transition: 0.2s;
  }

  .star.active {
    color: gold;
    text-shadow: 0 0 13px gold;
  }

  .star {
    font-size: 24px;
    cursor: pointer;
    color: lightgray;
  }

  .star.active {
    color: gold;
  }

  button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #1976d2;
    color: white;
    border: 2px solid black;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  .movie-list {
    margin-top: 20px;
    overflow: visible;
  }

  .movie-item {
    background: #111;
    border: 1px solid #333;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;

    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .movie-item:hover {
    transform: scale(1.10);
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
  }

  .gold {
    color: gold;
  }

  input::placeholder {
    color: #888;
  }

  input:focus::placeholder {
    color: #444;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Add a Movie</h2>

  <label>Title:</label>
  <input type="text" id="title">

  <label>Year:</label>
  <input type="number" id="year">

  <label>Genre:</label>
  <select id="genre">
    <option>Action</option>
    <option>Comedy</option>
    <option>Drama</option>
    <option>Horror</option>
    <option>Sci-Fi</option>
    <option>Romance</option>
    <option>Fantasy</option>
  </select>

  <label>Rating:</label>
  <div class="stars" id="stars">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>

  <button onclick="addMovie()">Add Movie</button>

  <h3>Movie List</h3>
  <div class="movie-list" id="movieList"></div>
</div>

<script>
  // inputed data for movies goes here⬇️⬇️
  let movies = JSON.parse(localStorage.getItem("movies")) || [];
  let rating = 0;

  const stars = document.querySelectorAll('.star');

  // adds function to stars
  stars.forEach(star => {
    star.addEventListener('click', () => {
      rating = star.getAttribute('data-value');
      updateStars();
    });
  });

  function updateStars() {
    stars.forEach(star => {
      star.classList.remove('active');
      if (star.getAttribute('data-value') <= rating) {
        star.classList.add('active');
      }
    });
  }

  function getStarsHTML(num) {
    let result = "";
    for (let i = 0; i < num; i++) {
      result += '<span class="gold">★</span>';
    }
    return result;
  }

  // adds moves to the list ⬇️⬇️
  function addMovie() {
    // calls functions for inputs
    const title = document.getElementById('title').value;
    const year = document.getElementById('year').value;
    const genre = document.getElementById('genre').value;

    // if no data is inputted (== 0)
    if (!title || !year || rating == 0) {
      alert("Please fill all fields!");
      return;
    }

    // creates the object
    const movie = { title, year, genre, rating };
    movies.push(movie);

    // updates the localStorage
    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();

    document.getElementById('title').value = "";
    document.getElementById('year').value = "";
    rating = 0;
    updateStars();
  }

  function displayMovies() {
    const movieList = document.getElementById('movieList');
    movieList.innerHTML = "";

    movies.forEach(movie => {
      const div = document.createElement('div');
      div.className = 'movie-item';
      div.innerHTML = `${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${getStarsHTML(movie.rating)}`;
      movieList.appendChild(div);
    });
  }

  displayMovies();
</script>

</body>
</html>
